INPUT_REGULATOR_HAPTIC = "m"
INPUT_TOUCHSCREEN = "y"
TOUCHSCREEN_ZINITIX = "m"
RMI4_CORE = "m"
RMI4_I2C = "m"
RMI4_SMB = "m"
RMI4_SPI = "m"
RMI4_F34 = "y"
RMI4_F55 = "y"
