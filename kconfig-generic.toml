DRM_PANEL_INNOLUX_P079ZCA = "m"
DRM_PANEL_KINGDISPLAY_KD097D04 = "m"
DRM_PANEL_VISIONOX_RM69299 = "m"
BACKLIGHT_PWM = "y"
["category:graphics".">=0.0.0"."all"]
BACKLIGHT_CLASS_DEVICE = "y"
BACKLIGHT_GPIO = "y"

# input devices
["category:input".">=0.0.0"."all"]
