RT2800PCI = "m"
RT2800USB = "m"
RT2X00 = "m"
RT61PCI = "m"
RT73USB = "m"
RTL8187 = "m"
RTL8723BS = "m"

# Trusted Platform Modules
["category:tpm".">=0.0.0"."aarch64 armv7"]
